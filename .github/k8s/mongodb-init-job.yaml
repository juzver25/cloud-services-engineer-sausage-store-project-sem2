apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-init-manual
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 90
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongodb-init
          image: mongo:7.0
          envFrom:
            - secretRef:
                name: mongodb-secret
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          command:
            - /bin/sh
            - -c
            - |
              mongosh "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/admin?serverSelectionTimeoutMS=10000" --eval "
              db = db.getSiblingDB('${REPORTS_DATABASE}');
              try {
                db.getUser('${REPORTS_USERNAME}');
                print('User exists');
              } catch (e) {
                db.createUser({
                  user: '${REPORTS_USERNAME}',
                  pwd: '${REPORTS_PASSWORD}',
                  roles: [{ role: 'readWrite', db: '${REPORTS_DATABASE}' }]
                });
                print('User created');
              }"
