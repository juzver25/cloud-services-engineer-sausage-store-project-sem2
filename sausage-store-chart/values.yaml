global:
  imagePullPolicy: Always
  imageRegistry: YOUR_DOCKERHUB
  initContainerResources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "50m"
      memory: "64Mi"
  mongodb:
    reportUsername: reports
    reportPassword: reportspassword
    database: sausage-store
  vault:
    enabled: false
    host: ""
    vaultToken: ""


frontend:
  replicas: 1
  revisionHistoryLimit: 15
  strategy:
    type: Recreate
  service:
    port: 80
  ingress:
    host: front-juz.2sem.students-projects.ru
    tlsSecret: 2sem-students-projects-wildcard-secret
    path: /
    pathType: Prefix
  containerPort: 80
  image:
    repository: sausage-frontend
    tag: latest
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "128Mi"
      cpu: "300m"
  nginxConf: nginx.conf
  livenessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 5

backend:
  annotations:
    path: /actuator/prometheus
    port: "8080"
    scrape: "true"
  env:
    postgresUri: jdbc:postgresql://postgresql:5432/sausage-store
    postgresUser: store
    postgresPassword: storepassword
    reportPath: /logs/reports
    logPath: /logs
    springAutoconfigureExclude: org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
    springFlywayEnabled: "false"
    springJpaHibernateDdlAuto: update
  service:
    port: 8080
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  image:
    repository: sausage-backend
    tag: latest
  imagePullPolicy: Always
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "768Mi"
      cpu: "400m"
  containerPort: 8080
  startupProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    periodSeconds: 10
    failureThreshold: 60
  livenessProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    periodSeconds: 15
    failureThreshold: 6
  readinessProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    periodSeconds: 10
    failureThreshold: 12
  vpa:
    updatePolicy:
      updateMode: "Off"
    resourcePolicy:
      containerPolicies:
        - containerName: "*"
          controlledResources:
            - cpu
            - memory

backend-report:
  replicas: 1
  revisionHistoryLimit: 15
  strategy:
    type: Recreate
  image:
    repository: sausage-backend-report
    tag: latest
  containerPort: 8080
  env:
    db: mongodb://reports:reportspassword@mongodb:27017/sausage-store
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  livenessProbe:
    httpGet:
      path: /api/v1/health
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /api/v1/health
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 5
  hpa:
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 80

infra:
  postgresql:
    image: postgres:16-alpine
    containerPort: 5432
    storage: 1Gi
    env:
      POSTGRES_USER: store
      POSTGRES_PASSWORD: storepassword
      POSTGRES_DB: sausage-store
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "300m"
  mongodb:
    image: mongo:7.0
    rootUsername: root
    rootPassword: rootpassword
    containerPort: 27017
    storage: 1Gi
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "100m"
    initJob:
      enabled: true
      image: mongo:7.0
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
