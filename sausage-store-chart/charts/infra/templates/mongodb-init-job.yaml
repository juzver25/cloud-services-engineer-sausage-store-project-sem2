apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-init-conf
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "4"
    helm.sh/hook-delete-policy: before-hook-creation
data:
  MONGO_INITDB_ROOT_USERNAME: {{ .Values.mongodb.env.MONGO_INITDB_ROOT_USERNAME }}
  MONGO_INITDB_ROOT_PASSWORD: {{ .Values.mongodb.env.MONGO_INITDB_ROOT_PASSWORD }}
  REPORTS_DB: {{ .Values.mongodb.reports.database }}
  REPORTS_USER: {{ .Values.mongodb.reports.username }}
  REPORTS_PASSWORD: {{ .Values.mongodb.reports.password }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-init-reports
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongodb-init
          image: mongo:7.0
          envFrom:
            - configMapRef:
                name: mongodb-init-conf
          command:
            - bash
            - -ec
            - |
              echo "Waiting for MongoDB..."
              until mongosh --host mongodb \
                --username "${MONGO_INITDB_ROOT_USERNAME}" \
                --password "${MONGO_INITDB_ROOT_PASSWORD}" \
                --authenticationDatabase admin \
                --eval "db.adminCommand('ping')" &>/dev/null; do
                sleep 5
              done

              echo "Creating database and user for reports..."
              mongosh --host mongodb \
                --username "${MONGO_INITDB_ROOT_USERNAME}" \
                --password "${MONGO_INITDB_ROOT_PASSWORD}" \
                --authenticationDatabase admin \
                --eval "
                  const dbName = '${REPORTS_DB}';
                  const userName = '${REPORTS_USER}';
                  const userPwd = '${REPORTS_PASSWORD}';
                  const targetDb = db.getSiblingDB(dbName);

                  if (targetDb.getUser(userName)) {
                    print('User already exists: ' + userName);
                  } else {
                    targetDb.createUser({
                      user: userName,
                      pwd: userPwd,
                      roles: [{ role: 'readWrite', db: dbName }]
                    });
                    print('User created: ' + userName);
                  }
                "
