apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: {{ .Values.mongodb.rootUsername | quote }}
  MONGO_INITDB_ROOT_PASSWORD: {{ .Values.mongodb.rootPassword | quote }}
  REPORTS_USERNAME: {{ .Values.global.mongodb.reportUsername | quote }}
  REPORTS_PASSWORD: {{ .Values.global.mongodb.reportPassword | quote }}
  REPORTS_DATABASE: {{ .Values.global.mongodb.database | quote }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: {{ .Values.mongodb.image }}
          envFrom:
            - secretRef:
                name: mongodb-secret
          ports:
            - containerPort: {{ .Values.mongodb.containerPort }}
          resources:
{{ toYaml .Values.mongodb.resources | indent 12 }}
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.mongodb.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: {{ .Release.Namespace }}
  labels:
    app: mongodb
spec:
  ports:
    - port: {{ .Values.mongodb.containerPort }}
      targetPort: {{ .Values.mongodb.containerPort }}
  selector:
    app: mongodb
  clusterIP: None
{{- if .Values.mongodb.initJob.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-init
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: "post-install"
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 120
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongodb-init
          image: {{ .Values.mongodb.initJob.image }}
          envFrom:
            - secretRef:
                name: mongodb-secret
          resources:
{{ toYaml .Values.mongodb.initJob.resources | indent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              URI="mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/admin?serverSelectionTimeoutMS=5000"
              for i in $(seq 1 30); do
                if mongosh "$URI" --quiet --eval "quit(db.adminCommand('ping').ok === 1 ? 0 : 1)" 2>/dev/null; then
                  break
                fi
                sleep 2
              done
              mongosh "$URI" --quiet --eval "
                const d = db.getSiblingDB('${REPORTS_DATABASE}');
                const users = d.getUsers().users || [];
                const exists = users.some(function(u) { return u.user === '${REPORTS_USERNAME}'; });
                if (!exists) {
                  d.createUser({
                    user: '${REPORTS_USERNAME}',
                    pwd: '${REPORTS_PASSWORD}',
                    roles: [{ role: 'readWrite', db: '${REPORTS_DATABASE}' }]
                  });
                  print('User created');
                } else {
                  print('User exists');
                }"
{{- end }}
